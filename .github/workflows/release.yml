name: CI/CD

on:
  push:
    branches: [ "go-rewrite", "main" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Build Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -o qoder-proxy-linux-amd64 .
        
      - name: Build Linux arm64
        run: GOOS=linux GOARCH=arm64 go build -o qoder-proxy-linux-arm64 .
        
      - name: Build Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -o qoder-proxy-windows-amd64.exe .
        
      - name: Build macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -o qoder-proxy-darwin-amd64 .
        
      - name: Build macOS arm64
        run: GOOS=darwin GOARCH=arm64 go build -o qoder-proxy-darwin-arm64 .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            qoder-proxy-linux-amd64
            qoder-proxy-linux-arm64
            qoder-proxy-windows-amd64.exe
            qoder-proxy-darwin-amd64
            qoder-proxy-darwin-arm64
          generate_release_notes: true
